<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Post-COVID Mental Health Survey</title>

<style>

body{
font-family:Arial;
background:hsla(0, 0%, 7%, 0.167);
color:#000;
padding:40px;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header img{
width:80px;
margin-bottom:10px;
}

.header h2{
margin:0;
color:#00adb5;
}

.container{
max-width:700px;
margin:auto;
background:#f3f1f1;
padding:30px;
border-radius:10px;
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:#0a0000;
margin-bottom:30px;
}

.question{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input, select{
width:100%;
padding:10px;
border:none;
border-radius:5px;
margin-top:5px;
}

.radio-group{
margin-top:5px;
}

.radio-group label{
font-weight:normal;
display:inline-block;
margin-right:15px;
}

button{
width:100%;
padding:12px;
background:#00adb5;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#008b92;
}

#thankyou{
display:none;
text-align:center;
font-size:20px;
margin-top:20px;
color:#010f09;
}

</style>
</head>

<body>

<div class="header">
<img src="img/lad-logo.jpg" alt="LAD College Logo">
<h2>LAD Lady Amritabai Daga College</h2>
</div>

<div class="container">

<h1>Post-COVID Mental Health Survey</h1>

<p>
To assess stress, anxiety, depression, and social adjustment issues among college students after COVID-19.
</p>

<form id="surveyForm" action="https://formspree.io/f/xaqpogok" method="POST">

<input type="hidden" name="_subject" value="Post-COVID Mental Health Survey Response">

<div class="question">
<label> Name</label>
<input type="text" name="Student Name" placeholder="Enter your Name" required>
</div>

<div class="question">
<label>1. Age</label>
<input type="number" name="Age" placeholder="Enter your Age" required>
</div>

<div class="question">
<label>2. Gender</label>
<select name="Gender" required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="question">
<label>3.Did you experience COVID-19 infection during the pandemic? (Yes/No/Not sure)</label>
<div class="radio-group">
<label><input type="radio" name="Did you experience COVID-19 infection?" value="Yes"> Yes</label>
<label><input type="radio" name="Did you experience COVID-19 infection?" value="No"> No</label>
<label><input type="radio" name="Did you experience COVID-19 infection?" value="Not sure"> Not sure</label>
</div>
</div>

<div class="question">
<label>4.After the COVID-19 pandemic, have you experienced increased stress? (Yes/No)</label>
<div class="radio-group">
<label><input type="radio" name="Did you experience increase stress?" value="Yes"> Yes</label>
<label><input type="radio" name="Did you experience increase stress?" value="No"> No</label>
<label><input type="radio" name="Did you experience increase stress?" value="Not sure"> Not sure</label>
</div>
</div>

<div class="question">
<label>5.Do you often feel anxious or worried about your future after the pandemic?</label>
<div class="radio-group">
<label><input type="radio" name="feel anxious or worried" value="Yes"> Yes</label>
<label><input type="radio" name="feel anxious or worried" value="No"> No</label>
</div>
</div>

<div class="question">
<label>6.	Have you experienced feelings of sadness or depression after the pandemic?</label>
<select name="Experienced sadness or depression">
<option>Yes</option>
<option>No</option>
<option>Sometimes</option>
</select>
</div>

<div class="question">
<label>7.	Do you find it difficult to concentrate on studies compared to before the pandemic?</label>
<select name="Difficulty concentrating on studies">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="question">
<label>8.	Has your sleep pattern changed after the COVID-19 pandemic?</label>
<select name="Sleep pattern changed">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="question">
<label>9.	Do you feel socially isolated or less connected with friends and classmates?</label>
<select name="Feel socially isolated">
<option>Yes</option>
<option>No</option>
<option>Sometimes</option>
</select>
</div>

<div class="question">
<label>10.	Has online learning during the pandemic affected your mental health?</label>
<select name="Online learning affected mental health">
<option>Yes</option>
<option>No</option>
<option>Not sure</option>
</select>
</div>

<div class="question">
<label>11.	Do you feel more pressure related to academic performance after the pandemic?</label>
<select name="Academic pressure">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="question">
<label>12.	Have you experienced lack of motivation for studies or daily activities?</label>
<select name="Lack of motivation">
<option>Yes</option>
<option>No</option>
<option>Sometimes</option>
</select>
</div>

<div class="question">
<label>13.	Do you talk to friends, family, or counselors when you feel stressed or anxious?</label>
<select name="Talk to others when stressed">
<option>Yes</option>
<option>No</option>
<option>Sometimes</option>
</select>
</div>

<div class="question">
<label>14.	Are you aware of mental health support services available in your college?</label>
<select name="Aware of mental health services">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="question">
<label>15.	In your opinion, should colleges provide more mental health awareness and counseling programs?</label>
<select name="Need more counseling programs in college">
<option>Yes</option>
<option>No</option>
</select>
</div>

<button type="submit">Submit Survey</button>

</form>

<div id="thankyou">
Thank you for participating in the survey!
</div>

</div>

<script>

document.getElementById("surveyForm").addEventListener("submit",function(){
setTimeout(function(){
document.getElementById("surveyForm").style.display="none";
document.getElementById("thankyou").style.display="block";
},1000);
});

</script>

</body>
</html>
